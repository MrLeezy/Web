<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haft 自动上传</title>
    <link rel="stylesheet" href="./haft-uploader.css" />
  </head>
  <body>
    <main class="plugin-shell">
      <section class="plugin-hero">
        <a class="hero-back" href="/">← 返回看板</a>
        <div class="hero-badge-row">
          <span class="hero-badge" id="pluginTypeBadge">内部插件</span>
          <span class="hero-badge" id="pluginCategoryBadge">自动化</span>
        </div>
        <h1 id="pluginTitle">Haft 自动上传</h1>
        <p class="hero-copy" id="pluginSummary">
          在一个页面里创建上传任务、管理调度器，并查看 Haft 自动化流程的执行日志。
        </p>
        <div class="hero-actions">
          <button id="createTaskButton" class="action-button" type="button">新建任务</button>
          <button id="refreshButton" class="action-button is-secondary" type="button">刷新</button>
          <button id="schedulerToggleButton" class="action-button is-secondary" type="button">切换调度器</button>
        </div>
        <p id="heroStatus" class="hero-status">正在加载当前调度器和任务状态...</p>
      </section>

      <section class="hero-metrics">
        <article class="metric-card">
          <span class="metric-label">调度器</span>
          <strong class="metric-value" id="schedulerStateValue">--</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">启用任务</span>
          <strong class="metric-value" id="enabledTaskValue">--</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">账号</span>
          <strong class="metric-value" id="accountCountValue">--</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">受保护账号</span>
          <strong class="metric-value" id="protectedCountValue">--</strong>
        </article>
      </section>

      <section class="plugin-layout">
        <section class="panel panel-tasks">
          <div class="panel-header">
            <div>
              <p class="panel-eyebrow">任务</p>
              <h2>任务队列</h2>
              <p id="taskSectionMeta" class="panel-copy">查看已配置任务，并发起手动测试执行。</p>
            </div>
          </div>
          <div id="taskList" class="task-list"></div>
        </section>

        <section class="panel panel-logs">
          <div class="panel-header">
            <div>
              <p class="panel-eyebrow">历史</p>
              <h2>最近日志</h2>
              <p id="logSectionMeta" class="panel-copy">最新上传结果和调试追踪会显示在这里。</p>
            </div>
            <button id="clearLogsButton" class="action-button is-ghost" type="button">清空日志</button>
          </div>
          <div id="logList" class="log-list"></div>
        </section>
      </section>
    </main>

    <div id="taskModal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-panel">
        <div class="panel-header">
          <div>
            <p class="panel-eyebrow">任务编辑</p>
            <h2 id="formTitle">新建任务</h2>
          </div>
          <button id="closeModalButton" class="action-button is-ghost" type="button">关闭</button>
        </div>

        <form id="taskForm" class="task-form">
          <input type="hidden" id="existingTaskId" />

          <div class="form-grid">
            <label>
              <span>任务名称</span>
              <input id="name" required />
            </label>

            <label>
              <span>账号</span>
              <select id="accountKey" required></select>
            </label>

            <label class="toggle toggle-row">
              <input id="enabled" type="checkbox" checked />
              <span>启用任务</span>
            </label>

            <label>
              <span>执行频率</span>
              <select id="scheduleMode">
                <option value="daily">每天</option>
                <option value="workday">工作日</option>
                <option value="weekly">指定星期</option>
              </select>
            </label>

            <label>
              <span>上传时间</span>
              <input id="uploadTime" type="time" required value="09:00" />
            </label>

            <fieldset id="weekdayField" class="weekday-field hidden">
              <legend>上传星期</legend>
              <div class="weekday-grid">
                <label><input type="checkbox" name="weekday" value="1" checked />周一</label>
                <label><input type="checkbox" name="weekday" value="2" checked />周二</label>
                <label><input type="checkbox" name="weekday" value="3" checked />周三</label>
                <label><input type="checkbox" name="weekday" value="4" checked />周四</label>
                <label><input type="checkbox" name="weekday" value="5" checked />周五</label>
                <label><input type="checkbox" name="weekday" value="6" />周六</label>
                <label><input type="checkbox" name="weekday" value="0" />周日</label>
              </div>
            </fieldset>

            <label>
              <span>文件来源</span>
              <select id="fileSourceType">
                <option value="directory">本地目录</option>
                <option value="download">链接下载</option>
              </select>
            </label>

            <label id="directoryPathField">
              <span>目录路径</span>
              <input id="directoryPath" />
            </label>

            <label id="downloadDirField" class="hidden">
              <span>下载目录</span>
              <input id="downloadDir" />
              <small class="field-hint">文件会先下载到这里，然后上传最新文件。</small>
            </label>

            <label id="urlsField" class="hidden form-grid-full">
              <span>下载链接</span>
              <textarea id="urlsText" rows="5" placeholder="每行一个下载链接"></textarea>
            </label>

            <label id="downloadDateModeField" class="hidden">
              <span>下载日期</span>
              <select id="downloadDateMode">
                <option value="yesterday">昨天</option>
                <option value="custom">指定日期</option>
              </select>
            </label>

            <label id="customStartDateField" class="hidden">
              <span>指定日期</span>
              <div class="date-select-grid">
                <select id="customStartYear" aria-label="指定年份"></select>
                <select id="customStartMonth" aria-label="指定月份"></select>
                <select id="customStartDay" aria-label="指定日期"></select>
              </div>
              <small class="field-hint">仅会替换下载链接中为空的 `start=` 参数。</small>
            </label>

            <label>
              <span>所需文件数量</span>
              <input id="requiredCount" type="number" min="1" value="1" />
            </label>

            <label>
              <span>文件稳定等待（毫秒）</span>
              <input id="stableWindowMs" type="number" min="1000" step="500" value="4000" />
            </label>

            <label class="toggle toggle-row">
              <input id="headless" type="checkbox" />
              <span>无头浏览器</span>
            </label>

            <label>
              <span>慢速执行（毫秒）</span>
              <input id="slowMoMs" type="number" min="0" step="50" value="200" />
            </label>

            <label>
              <span>上传后等待（毫秒）</span>
              <input id="postUploadDelayMs" type="number" min="1000" step="500" value="3000" />
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" class="action-button">保存任务</button>
            <button type="button" id="resetFormButton" class="action-button is-secondary">重置</button>
          </div>
        </form>

        <p id="formMessage" class="form-message"></p>
      </section>
    </div>

    <script src="./haft-uploader.js"></script>
  </body>
</html>
